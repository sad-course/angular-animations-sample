<li
  class="task-item"
  [class.task-item--done]="task.done"
  [@taskState]="animState"
  (@taskState.done)="onAnimationDone($event)"
>
  <!-- Checkbox -->
  <button
    class="task-check"
    [class.task-check--checked]="task.done"
    (click)="onToggle()"
    [attr.aria-label]="task.done ? 'Marcar como pendente' : 'Marcar como concluída'"
  >
    <svg *ngIf="task.done" xmlns="http://www.w3.org/2000/svg" width="13" height="13"
      viewBox="0 0 24 24" fill="none" stroke="currentColor"
      stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="20 6 9 17 4 12"/>
    </svg>
  </button>

  <!-- Title -->
  <span class="task-title">{{ task.title }}</span>

  <!-- Remove Button — always visible, prominent -->
  <button class="task-remove" (click)="onRemoveClick()" aria-label="Remover tarefa">
    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14"
      viewBox="0 0 24 24" fill="none" stroke="currentColor"
      stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <line x1="18" y1="6" x2="6" y2="18"/>
      <line x1="6" y1="6" x2="18" y2="18"/>
    </svg>
  </button>
</li>
