<main class="todo-shell">
  <div class="todo-card">

    <header class="todo-header">
      <h1 class="todo-title">My Tasks</h1>
      <span class="todo-badge" *ngIf="tasks.length">
        {{ pendingCount }} remaining
      </span>
    </header>

    <!-- Add Task Input -->
    <div class="add-task-row">
      <input
        class="add-task-input"
        type="text"
        placeholder="Add a new task…"
        [(ngModel)]="newTaskTitle"
        (keydown.enter)="addTask()"
        maxlength="120"
      />
      <button class="add-task-btn" (click)="addTask()" [disabled]="!newTaskTitle.trim()">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"
          fill="none" stroke="currentColor" stroke-width="2.5"
          stroke-linecap="round" stroke-linejoin="round">
          <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
        </svg>
      </button>
    </div>

    <!-- Task List -->
    <ul class="task-list" [@listAnimation]="tasks.length">
      <app-task
        *ngFor="let task of tasks; trackBy: trackById"
        [task]="task"
        (toggle)="toggleTask($event)"
        (removeDone)="removeTask($event)"
      />
    </ul>

    <!-- Empty State -->
    <div class="empty-state" *ngIf="tasks.length === 0">
      <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24"
        fill="none" stroke="currentColor" stroke-width="1.5"
        stroke-linecap="round" stroke-linejoin="round">
        <path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/>
      </svg>
      <p>All clear! Add your first task above.</p>
    </div>

    <!-- Footer Actions -->
    <footer class="todo-footer" *ngIf="tasks.length > 0">
      <span class="footer-count">{{ tasks.length }} task{{ tasks.length !== 1 ? 's' : '' }} total</span>
      <button
        class="clear-btn"
        (click)="clearCompleted()"
        [disabled]="pendingCount === tasks.length"
      >
        Clear completed
      </button>
    </footer>

  </div>
</main>
